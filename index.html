<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/main.css">
    <title>HW17 Responsive</title>
</head>

<body>
    <header class="header">
        <div class="container flex_container">
            <div class="logo">
                <svg width="142" height="12">
                    <use xlink:href="./assets/img/svg/sprite.svg#icon-logo"></use>
                </svg>
            </div>
            <nav>
                <ul class="menu">
                    <li class="menu_item"><a href="#" class="menu_link">home</a></li>
                    <li class="menu_item"><a href="#" class="menu_link">about</a></li>
                    <li class="menu_item"><a href="#" class="menu_link">works</a></li>
                    <li class="menu_item"><a href="#" class="menu_link">blog</a></li>
                    <li class="menu_item"><a href="#" class="menu_link">contact</a></li>
                </ul>
            </nav>
            <div class="search">
                <svg width="17" height="16">
                    <use xlink:href="./assets/img/svg/sprite.svg#icon-search">

                </svg>
            </div>
        </div>
    </header>
    <main class="main">
        <section class="hero">
            <div class="container">
                <h1 class="title_1">Manifest is a newborn theme.
                    Clean, simple and fast.</h1>
            </div>
        </section>
        <section class="blog">
            <div class="container">
                <h2 class="title_2">Blog</h2>
                <article class="article">
                    <div class="article_img">
                        <img src="" alt="">
                    </div>
                    <div class="article_descr">
                        <h3 class="article_subtitle"></h3>
                        <h2 class="article_title"></h2>
                        <time datetime="" class="article_date"></time>
                        <p class="article_text"></p>

                    </div>
                </article>
                <article class="article article_revers">
                    <div class="article_img">
                        <img src="" alt="">
                    </div>
                    <div class="article_descr">
                        <h3 class="article_subtitle"></h3>
                        <h2 class="article_title"></h2>
                        <time datetime="" class="article_date"></time>
                        <p class="article_text"></p>

                    </div>

                </article>
            </div>
        </section>
    </main>
    <footer class="footer">

    </footer>
</body>

</html>
